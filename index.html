<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Newton-Fraktal Explorer | Facharbeit</title>
    <style>
        :root { --accent: #00d4ff; --bg: rgba(10, 10, 10, 0.8); }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Roboto, sans-serif; touch-action: none; color: white; }
        canvas { display: block; width: 100vw; height: 100vh; }

        /* UI Panel */
        .ui-panel {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: var(--bg); padding: 25px; border-radius: 24px;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            width: 85%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); z-index: 100;
            transition: opacity 0.5s;
        }

        .title { margin: 0 0 15px 0; font-size: 1.2rem; font-weight: 300; letter-spacing: 2px; text-align: center; color: var(--accent); text-transform: uppercase; }
        
        .control-group { margin-bottom: 15px; }
        label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; display: block; margin-bottom: 5px; }
        
        input[type=range] { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; outline: none; -webkit-appearance: none; accent-color: var(--accent); }

        .status-badge {
            position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.5);
            padding: 8px 15px; border-radius: 20px; font-size: 0.7rem;
            border: 1px solid rgba(0,212,255,0.3); display: flex; align-items: center; gap: 8px;
        }
        .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .fs-btn {
            position: absolute; top: 20px; right: 20px; background: var(--bg);
            border: 1px solid rgba(255,255,255,0.2); color: white;
            padding: 10px; border-radius: 12px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="status-badge" id="status">
    <div class="dot"></div> <span id="statusText">Auto-Pilot aktiv</span>
</div>

<button class="fs-btn" onclick="toggleFS()">Vollbild</button>

<div class="ui-panel" id="ui">
    <h1 class="title">Newton-Algorithmus</h1>
    
    <div class="control-group">
        <label>Grad des Polynoms (n): <span style="float:right" id="nVal">3.00</span></label>
        <input type="range" id="nSlider" min="2" max="8" step="0.01" value="3">
    </div>

    <div class="control-group">
        <label>Farb-Dynamik</label>
        <input type="range" id="timeSlider" min="0" max="5" step="0.1" value="1">
    </div>

    <p style="font-size: 0.6rem; text-align: center; opacity: 0.4; margin: 0;">Berühren zum Erkunden | Auto-Pilot nach 5s Inaktivität</p>
</div>

<canvas id="glCanvas"></canvas>

<script type="x-shader/x-fragment" id="fragmentShader">
    precision highp float;
    uniform vec2 u_res;
    uniform float u_n;
    uniform float u_zoom;
    uniform float u_time;
    uniform vec2 u_offset;

    vec2 cDiv(vec2 a, vec2 b) {
        float d = dot(b, b);
        return vec2(dot(a, b), a.y*b.x - a.x*b.y) / d;
    }

    vec2 cPow(vec2 z, float n) {
        float r = length(z);
        if (r < 1e-10) return vec2(0.0);
        float phi = atan(z.y, z.x);
        return pow(r, n) * vec2(cos(n * phi), sin(n * phi));
    }

    void main() {
        vec2 uv = (gl_FragCoord.xy - 0.5 * u_res.xy) / min(u_res.y, u_res.x);
        vec2 z = uv * u_zoom + u_offset;
        float iter = 0.0;
        for (float i = 0.0; i < 80.0; i++) {
            vec2 fz = cPow(z, u_n) - vec2(1.0, 0.0);
            vec2 dfz = u_n * cPow(z, u_n - 1.0);
            z -= cDiv(fz, dfz);
            if (length(fz) < 0.0001) { iter = i; break; }
        }
        float angle = atan(z.y, z.x);
        vec3 col = 0.5 + 0.4 * cos(angle + vec3(0, 2, 4) + u_time);
        gl_FragColor = vec4(col * (1.0 - pow(iter/80.0, 0.5)), 1.0);
    }
</script>

<script>
    const canvas = document.getElementById('glCanvas');
    const gl = canvas.getContext('webgl');
    
    // Shader Setup
    function createShader(gl, type, source) {
        const s = gl.createShader(type);
        gl.shaderSource(s, source);
        gl.compileShader(s);
        return s;
    }
    const vs = createShader(gl, gl.VERTEX_SHADER, `attribute vec2 pos; void main(){gl_Position=vec4(pos,0,1);}`);
    const fs = createShader(gl, gl.FRAGMENT_SHADER, document.getElementById('fragmentShader').text);
    const prog = gl.createProgram();
    gl.attachShader(prog, vs); gl.attachShader(prog, fs);
    gl.linkProgram(prog); gl.useProgram(prog);

    const buffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
    const pos = gl.getAttribLocation(prog, 'pos');
    gl.enableVertexAttribArray(pos);
    gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);

    const uniforms = {
        res: gl.getUniformLocation(prog, 'u_res'),
        n: gl.getUniformLocation(prog, 'u_n'),
        zoom: gl.getUniformLocation(prog, 'u_zoom'),
        time: gl.getUniformLocation(prog, 'u_time'),
        offset: gl.getUniformLocation(prog, 'u_offset')
    };

    let zoom = 2.5, offsetX = 0.0, offsetY = 0.0;
    let lastInteraction = Date.now();
    let autoTime = 0;
    let lastTouchX, lastTouchY, lastDist = 0;

    function toggleFS() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    // Interaktions-Trigger
    function activity() { 
        lastInteraction = Date.now(); 
        document.getElementById('statusText').innerText = "Interaktion aktiv";
        document.getElementById('status').style.borderColor = "rgba(255,255,255,0.5)";
    }

    canvas.addEventListener('touchstart', e => {
        activity();
        if (e.touches.length === 1) {
            lastTouchX = e.touches[0].clientX; lastTouchY = e.touches[0].clientY;
        } else if (e.touches.length === 2) {
            lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        }
    });

    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        activity();
        if (e.touches.length === 1) {
            const dx = e.touches[0].clientX - lastTouchX;
            const dy = e.touches[0].clientY - lastTouchY;
            offsetX -= (dx / canvas.width) * zoom;
            offsetY += (dy / canvas.height) * zoom;
            lastTouchX = e.touches[0].clientX; lastTouchY = e.touches[0].clientY;
        } else if (e.touches.length === 2) {
            const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            if (lastDist > 0) zoom *= (lastDist / dist);
            lastDist = dist;
        }
    }, { passive: false });

    function render(now) {
        const timeDelta = 0.01;
        autoTime += timeDelta;
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        gl.viewport(0, 0, canvas.width, canvas.height);

        let n = parseFloat(document.getElementById('nSlider').value);
        let idleTime = Date.now() - lastInteraction;

        // AUTO-PILOT LOGIK
        if (idleTime > 5000) {
            document.getElementById('statusText').innerText = "Auto-Pilot";
            document.getElementById('status').style.borderColor = "var(--accent)";
            n = 3.5 + Math.sin(autoTime * 0.3) * 1.5;
            document.getElementById('nSlider').value = n;
            zoom *= (1.0 + Math.sin(autoTime * 0.5) * 0.002);
            // Langsame Rückkehr zum Zentrum, falls man sich verirrt hat
            offsetX *= 0.995;
            offsetY *= 0.995;
        }

        gl.uniform2f(uniforms.res, canvas.width, canvas.height);
        gl.uniform1f(uniforms.n, n);
        gl.uniform1f(uniforms.zoom, zoom);
        gl.uniform1f(uniforms.time, autoTime * parseFloat(document.getElementById('timeSlider').value));
        gl.uniform2f(uniforms.offset, offsetX, offsetY);
        
        document.getElementById('nVal').innerText = n.toFixed(2);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        requestAnimationFrame(render);
    }
    requestAnimationFrame(render);
</script>
</body>
</html>
